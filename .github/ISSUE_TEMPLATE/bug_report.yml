name: 🐛 Bug Report
description: Report something that is broken or not working as expected
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: "When I open the Files tab, the app crashes immediately..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Open the app
        2. Go to Files tab
        3. Type an invalid path
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Paste any error message or traceback here.
      render: shell
    validations:
      required: true

  - type: dropdown
    id: tab
    attributes:
      label: Which Tab Is Affected?
      options:
        - Home
        - Packages
        - System
        - Files
        - All / General
        - Not sure
    validations:
      required: true

  - type: input
    id: python_version
    attributes:
      label: Python Version
      description: Run `python --version`
      placeholder: "e.g. Python 3.11.4"
    validations:
      required: true

  - type: input
    id: termux_version
    attributes:
      label: Termux Version
      description: Run `termux-info | grep version` or check in Termux app settings
      placeholder: "e.g. 0.118.0"
    validations:
      required: false

  - type: input
    id: android_version
    attributes:
      label: Android Version
      placeholder: "e.g. Android 13"
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, paste or drag-and-drop screenshots here.
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other information that might help us fix this.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues and this has not been reported before
          required: true
        - label: I am using the latest version of Termux-TUI
          required: false
